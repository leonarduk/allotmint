name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  ai-review:
    if: ${{ github.actor != 'dependabot[bot]' && vars.ENABLE_CLAUDE_REVIEW != 'false' }}
    permissions:
      pull-requests: write
      contents: read
      issues: write
    uses: ./.github/workflows/_ai-pr-review.yml
    with:
      provider_name: Claude
      provider_id: claude
      review_script: .github/scripts/claude_review.py
      workflow_file: claude-pr-review.yml
      anthropic_max_tokens: "6000"
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  # Dependabot PRs skip the review job above, which GitHub records as "skipped"
  # rather than "success". This job's name reproduces the composite check
  # context a real reusable-workflow run would produce ("ai-review / Claude
  # AI code review"), so any branch protection rule keyed on that exact
  # string still gets satisfied for Dependabot PRs.
  #
  # This context is NOT currently a required status check on `main` (only
  # DeepSeek's is — see deepseek-pr-review.yml). Kept here for consistency
  # and in case this context is ever made required in the future.
  dependabot-pass:
    name: ai-review / Claude AI code review
    if: github.actor == 'dependabot[bot]'
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Dependabot PR — Claude review not required, passing."

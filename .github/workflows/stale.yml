# This workflow warns and then closes issues and PRs that have had no activity for a specified amount of time.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/actions/stale
name: Mark stale issues and pull requests

on:
  schedule:
  - cron: '45 3 * * *'

jobs:
  stale:

    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - uses: actions/stale@v10
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        days-before-stale: 60
        days-before-close: 14
        stale-issue-label: 'no-issue-activity'
        stale-pr-label: 'no-pr-activity'
        exempt-pr-labels: 'in-review,blocked,wip'
        exempt-all-milestones: true
        stale-issue-message: >
          This issue has had no activity for 60 days and has been marked stale.
          If this is still relevant, please comment or remove the `no-issue-activity` label.
          It will be closed in 14 days if there is no further activity.
        stale-pr-message: >
          This PR has had no activity for 60 days and has been marked stale.
          If it is still in progress, please push a commit or remove the `no-pr-activity` label.
          It will be closed in 14 days if there is no further activity.
        close-issue-message: >
          This issue was closed automatically after 14 days with no activity following the stale notice.
          Feel free to reopen it if the work is still relevant.
        close-pr-message: >
          This PR was closed automatically after 14 days with no activity following the stale notice.
          Feel free to reopen it or open a new PR if the work should continue.

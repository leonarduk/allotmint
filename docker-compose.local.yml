services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env.local
    volumes:
      - ./data:/app/data:ro
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_ALLOTMINT_API_BASE: /api
        VITE_APP_BASE_URL: http://localhost:3000
    depends_on:
      - backend
    ports:
      - "3000:80"

name: Sync Changes Requested label

# The DeepSeek PR review workflow adds the 'Changes Requested' label when its
# verdict is "changes requested" (see deepseek-pr-review.yml). Clearing it
# can't safely happen from inside its own job: a job's own check-run
# conclusion isn't finalized as 'success' until the job completes, and the
# label step runs *inside* that same job.
#
# This workflow runs *after* the review workflow completes, so it can
# observe the finalized conclusion. It removes the label once the DeepSeek
# review check run for the current head SHA has concluded with 'success'.
on:
  workflow_run:
    workflows: ["DeepSeek PR Review"]
    types: [completed]

jobs:
  sync-label:
    name: Remove 'Changes Requested' label once review approves
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      checks: read
    steps:
      - name: Reconcile label against review verdict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PR_NUMBER=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/pulls" \
            --jq '[.[] | select(.state == "open")] | first | .number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for ${HEAD_SHA}; nothing to reconcile."
            exit 0
          fi

          DEEPSEEK_CONCLUSION=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs" --paginate \
            --jq '[.check_runs[] | select(.name == "DeepSeek AI code review")] | sort_by(.started_at) | last | .conclusion // "pending"')

          echo "PR #${PR_NUMBER} @ ${HEAD_SHA}: DeepSeek=${DEEPSEEK_CONCLUSION}"

          if [ "$DEEPSEEK_CONCLUSION" = "success" ]; then
            HAS_LABEL=$(gh pr view "$PR_NUMBER" --json labels \
              --jq '[.labels[].name] | any(. == "Changes Requested")')

            if [ "$HAS_LABEL" = "true" ]; then
              gh pr edit "$PR_NUMBER" --remove-label "Changes Requested"
              gh pr comment "$PR_NUMBER" --body \
                "DeepSeek AI review has passed for the latest commit -- removing the 'Changes Requested' label."
            else
              echo "Label not present on PR #${PR_NUMBER}; nothing to remove."
            fi
          else
            echo "Review hasn't approved yet; leaving 'Changes Requested' label as-is."
          fi

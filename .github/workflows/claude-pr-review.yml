name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  ai-review:
    name: Claude AI code review
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      pull-requests: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(python3 .github/scripts/prepare_review_diff.py --base-ref "${{ github.base_ref }}")
          DELIM="EOF_$(uuidgen | tr -d '-')"
          {
            echo "diff<<$DELIM"
            echo "$DIFF"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Get linked issue body
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=$(gh pr view ${{ github.event.pull_request.number }} --json body,title \
            | jq -r '[.title, .body] | join(" ")' \
            | grep -oE '(Closes|Fixes|Refs) #[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
          if [ -n "$ISSUE_NUM" ]; then
            ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body -q .body 2>/dev/null || echo "Issue not found")
          else
            ISSUE_BODY="No linked issue found. Review code on its own merits."
          fi
          DELIM="EOF_$(uuidgen | tr -d '-')"
          {
            echo "body<<$DELIM"
            echo "$ISSUE_BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Call Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MAX_TOKENS: "6000"
          PR_TITLE: ${{ github.event.pull_request.title }}
          DIFF: ${{ steps.diff.outputs.diff }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          python3 .github/scripts/claude_review.py > /tmp/claude_review_body.md

          if [ ! -s /tmp/claude_review_body.md ]; then
            echo "ERROR: Claude review output was empty" >&2
            exit 1
          fi

      - name: Check Claude approval
        id: check_claude_approval
        continue-on-error: true  # REQUEST CHANGES exits 1; allow later steps to still run
        run: |
          python3 .github/scripts/extract_verdict.py /tmp/claude_review_body.md Claude

      - name: Post Claude review comment
        if: always() && !cancelled()
        continue-on-error: true  # If posting fails (e.g. API rate limit), don't fail job; review is also in Actions summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -s /tmp/claude_review_body.md ]; then
            # Claude API succeeded — post the full review (APPROVE or REQUEST CHANGES)
            {
              echo "## Claude AI Code Review"
              echo ""
              cat /tmp/claude_review_body.md
              echo ""
              echo "---"
              echo "*Reviewed by Claude via [claude-pr-review.yml](.github/workflows/claude-pr-review.yml). Advisory only.*"
            } > /tmp/claude_comment_body.md
          else
            # Claude API failed or produced empty output — notify user to check logs
            {
              echo "## Claude AI Code Review - Failed"
              echo ""
              echo "The Claude review failed to complete. Check [Actions]($RUN_URL) for error details."
            } > /tmp/claude_comment_body.md
          fi

          gh pr comment "$PR_NUMBER" --body-file /tmp/claude_comment_body.md

          # Also write to Actions job summary — same file posted as the PR comment,
          # so the guard, content, and fallback are identical.
          cat /tmp/claude_comment_body.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create follow-up issues
        if: steps.check_claude_approval.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Ensure the ai-suggested label exists before creating issues
          gh label create "ai-suggested" --color "0075ca" --description "Suggested by AI code review" \
            2>/dev/null || true

          python3 .github/scripts/extract_followups.py /tmp/claude_review_body.md \
            | jq -r '.[]' \
            | while IFS= read -r title; do
                [ -z "$title" ] && continue
                echo "Creating issue: $title"
                gh issue create \
                  --title "$title" \
                  --body "Follow-up suggested by Claude AI review of PR #${PR_NUMBER}." \
                  --label "ai-suggested"
              done

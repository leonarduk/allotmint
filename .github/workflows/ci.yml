name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python scripts/check_branch_protection_required_checks.py
      - name: Run extract_verdict tests
        run: pytest tests/test_extract_verdict.py -v --no-cov
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      # tsc -b resolves frontend/tsconfig.json, which references
      # tsconfig.app.json (src/) and tsconfig.node.json (vite.config.ts).
      # Both are checked in one pass; no Vite build required.
      - name: TypeScript type-check (tsc -b)
        run: npm run type-check
        working-directory: frontend
      - run: npm test -- --run
        working-directory: frontend
      - name: Check cdk/tests/ exists and has tests
        run: |
          if [ ! -d "cdk/tests" ] || [ -z "$(ls -A cdk/tests/)" ]; then
            echo "ERROR: cdk/tests/ is missing or empty. The test job requires at least one test file in cdk/tests/."
            exit 1
          fi
      - name: CDK infrastructure tests
        run: pytest cdk/tests/ --no-cov

  shell-tests:
    name: Bash script tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      # bats-core is fetched on demand via npx rather than assuming it's
      # preinstalled on the runner image; pin the version so an upstream
      # bats-core release can't silently change CI behaviour. All aws CLI
      # calls in these tests are mocked (see
      # tests/bash/fetch-cloudwatch-logs.bats), so this is a pure dry-run
      # with no live AWS network access.
      - name: Run bats tests for deploy shell scripts
        run: npx --yes bats@1.13.0 tests/bash/*.bats

  powershell-tests:
    name: PowerShell script tests (Pester)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # ubuntu-latest ships pwsh but not Pester; pin the version so an
      # upstream Pester release can't silently change test semantics.
      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -RequiredVersion 5.6.1 -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Run Pester tests for scripts/aider-issue.ps1
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 5.6.1 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = 'scripts/tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  # Not redundant with lambda-compat below despite both installing
  # backend/requirements.txt: this job is a pure dependency-resolution check
  # (pip install --dry-run, no packages actually installed, no tests run)
  # that also asserts no duplicate package names in the requirements file --
  # both fast, install-free checks lambda-compat doesn't perform. lambda-compat
  # does a full real install plus the entire pytest suite, which is slower and
  # gives no earlier signal on a dependency conflict than this job already
  # gives. Keep both (issue #4467).
  validate-backend-deps:
    name: Validate backend/requirements.txt (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Assert no duplicate package names in backend/requirements.txt
        run: |
          python - << 'PY'
          import re, sys
          from pathlib import Path
          lines = Path("backend/requirements.txt").read_text(encoding="utf-8").splitlines()
          # Skip blank lines, comments (#), and any pip option line (-r, -c,
          # -e, --index-url, etc.).  All pip options start with "-", so a
          # single startswith check covers them regardless of spacing.
          # Normalise per PEP 503: treat "-", "_", "." as equivalent so
          # "typing_extensions" and "typing-extensions" are the same package.
          pkgs = [
              re.sub(r"[-_.]+", "-",
                     re.sub(r"\[.*?\]", "",
                            re.split(r"[~>=<!;\s#]", line)[0].strip())).lower()
              for line in lines
              if line.strip() and not line.strip().startswith(("#", "-"))
          ]
          seen: set[str] = set()
          dups: list[str] = []
          for pkg in pkgs:
              if pkg in seen:
                  dups.append(pkg)
              else:
                  seen.add(pkg)
          if dups:
              print(f"Duplicate package names in backend/requirements.txt: {dups}", file=sys.stderr)
              sys.exit(1)
          print(f"No duplicate package names ({len(pkgs)} packages checked).")
          PY
      # Use a clean venv so runner pre-installs cannot mask genuine conflicts.
      # Upgrade pip first: --dry-run was added in pip 23.1 and is silently
      # ignored on older versions, which would let a broken file pass.
      - name: Dry-run install to catch dependency conflicts before they reach Docker
        run: |
          python -m venv .venv-lambda-check
          .venv-lambda-check/bin/pip install --upgrade pip
          .venv-lambda-check/bin/pip --version
          if ! .venv-lambda-check/bin/pip install --dry-run -r backend/requirements.txt; then
            echo "::error file=backend/requirements.txt::Dependency conflict detected — Docker build will fail. Check pip output above for the conflicting packages."
            exit 1
          fi

  lambda-compat:
    name: Lambda-compat pytest (backend/requirements.txt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Create isolated venv for Lambda-compat test
        # Use an explicit venv so that runner pre-installs cannot mask missing
        # pins, matching the isolation pattern used by validate-backend-deps.
        run: python -m venv .venv-lambda
      - name: Install Lambda-compatible deps + test tooling
        run: |
          .venv-lambda/bin/pip install --upgrade pip
          .venv-lambda/bin/pip install -r backend/requirements.txt -r backend/requirements-test.txt
      - name: Run backend pytest suite against Lambda deps
        env:
          ALLOTMINT_SKIP_SNAPSHOT_WARM: 'true'
        # Run tests/ under Lambda-pinned deps to validate the backend works in
        # the constrained Lambda runtime environment. The test job runs cdk/tests/
        # instead, covering CDK infrastructure. This avoids duplication: tests/
        # runs once (here), cdk/tests/ runs once (in test job), against their
        # respective dependency sets.
        run: .venv-lambda/bin/pytest tests/

  lint-shell-scripts:
    name: Lint .github/scripts shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # ubuntu-latest ships shellcheck preinstalled; non-blocking (continue-on-error)
      # until the existing scripts are cleaned up and this can be made required.
      - name: Run shellcheck
        continue-on-error: true
        run: shellcheck .github/scripts/*.sh

  lint-workflows:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.7"
        run: |
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          sudo mv actionlint /usr/local/bin/actionlint
          rm actionlint.tar.gz
      - name: Run actionlint (includes shellcheck on inline scripts)
        run: actionlint

  python-compatibility:
    name: Python ${{ matrix.python-version }} compatibility smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v7
      # Python 3.12 remains covered by the primary CI/backend integration job;
      # this lightweight smoke keeps Python 3.11 support honest without
      # duplicating the full backend integration and coverage workflow.
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Check SPA contract version sync
        run: python scripts/check_contract_version_sync.py
      - name: Run lightweight backend compatibility tests
        env:
          ALLOTMINT_SKIP_SNAPSHOT_WARM: 'true'
        run: pytest --no-cov tests/test_backend_api.py::test_health tests/backend/common/test_data_provider_parity.py -q

  detect-frontend-changes:
    name: Detect frontend-relevant changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'

  frontend-smoke:
    name: Frontend smoke tests (preview build)
    needs: [test, detect-frontend-changes]
    if: needs.detect-frontend-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-frontend-deps
      - name: Build preview
        run: npm run build:preview
        working-directory: frontend
      - name: Verify base href is relative in built index.html
        run: |
          set -euo pipefail
          if grep -q '<base href="http' frontend/dist/index.html; then
            echo "::error file=frontend/index.html::Built index.html contains an absolute <base href=\"http...\"> which breaks routing in deployed environments (the base URL must be relative, e.g. <base href=\"/\">). Check that index.html's <base href> is hardcoded to a relative path and not dynamically set."
            exit 1
          fi
          echo "✓ base href is relative (no absolute http:// or https:// base found)"
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Run frontend smoke tests
        run: npx playwright test --config playwright.config.ts tests/smoke.spec.ts
        working-directory: frontend
      - name: Upload Playwright smoke-test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-frontend-smoke-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore

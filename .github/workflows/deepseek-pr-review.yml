name: DeepSeek PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]

# labeled/unlabeled events on "Deep Review Required" fire an extra run
# alongside the synchronize-triggered run, and the two runs' check results
# (one often "skipped" via the ai-review job's `if`, the other "successful")
# can both remain visible for the same head SHA. Grouping by PR number and
# cancelling in-progress runs ensures only the most recent run's job is
# still executing when a newer event arrives, so branch protection and the
# checks UI settle on a single up-to-date result per SHA instead of
# accumulating stale ones from earlier label toggles or pushes.
concurrency:
  group: deepseek-pr-review-${{ github.event.pull_request.number }}
  # cancel-in-progress is safe here because this workflow has only one job (ai-review).
  # No other jobs have side effects (deployments, state mutations, cleanup) that would
  # be dangerous to interrupt. If additional jobs are added, reassess this setting.
  cancel-in-progress: true

jobs:
  ai-review:
    # For labeled/unlabeled events, github.event.label.name is the label that
    # was just added or removed. Gating on it here covers both directions:
    # adding "Deep Review Required" triggers a run that picks up the stronger
    # model below, and removing it triggers a run that reverts to the
    # defaults (since `contains(...)` on the current labels is then false).
    # Any other label add/remove is ignored.
    if: >-
      ${{ github.actor != 'dependabot[bot]' && vars.ENABLE_DEEPSEEK_REVIEW != 'false' &&
      (github.event.action != 'labeled' && github.event.action != 'unlabeled' ||
      github.event.label.name == 'Deep Review Required') }}
    permissions:
      pull-requests: write
      contents: read
      issues: write
    uses: ./.github/workflows/_ai-pr-review.yml
    with:
      provider_name: DeepSeek
      provider_id: deepseek
      review_script: .github/scripts/deepseek_review.py
      workflow_file: deepseek-pr-review.yml
      # "Deep Review Required" opts a PR into the stronger reasoning model
      # with a larger token budget (its chain-of-thought tokens count
      # against max_tokens). Without the label, the script falls back to
      # its defaults (deepseek-chat, 4096 tokens).
      deepseek_model: ${{ contains(github.event.pull_request.labels.*.name, 'Deep Review Required') && 'deepseek-reasoner' || '' }}
      deepseek_max_tokens: ${{ contains(github.event.pull_request.labels.*.name, 'Deep Review Required') && '16000' || '' }}
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  # Dependabot PRs skip the review job above, which GitHub records as "skipped"
  # rather than "success". Branch protection requires the exact check context
  # "ai-review / DeepSeek AI code review" (the composite name GitHub gives a
  # reusable-workflow call) — a plain job named "ai-review" does NOT match
  # that string, so it never satisfies the required check. This job's name
  # reproduces the composite string literally so Dependabot PRs unblock.
  dependabot-pass:
    name: ai-review / DeepSeek AI code review
    if: github.actor == 'dependabot[bot]'
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Dependabot PR — DeepSeek review not required, passing."

name: Ignore Snyk private-test limit

on:
  status:

permissions:
  statuses: write
  contents: read

jobs:
  override-snyk-private-test-limit:
    if: >-
      github.event.context == 'security/snyk (leonarduk)' &&
      github.event.state == 'failure' &&
      contains(github.event.description, 'used your limit of private tests')
    runs-on: ubuntu-latest
    steps:
      - name: Mark Snyk quota failures as ignored
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_URL: ${{ github.event.target_url }}
          SHA: ${{ github.event.sha }}
        run: |
          gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${{ github.repository }}/statuses/${SHA}" \
            -f state='success' \
            -f context='security/snyk (leonarduk)' \
            -f description='Ignored: Snyk private-test quota reached.' \
            -f target_url="${TARGET_URL}"

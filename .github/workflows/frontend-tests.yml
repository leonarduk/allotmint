name: Frontend Tests

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check SPA contract version sync
        run: python scripts/check_contract_version_sync.py

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Audit dependencies
        working-directory: frontend
        run: pnpm audit --audit-level=high

      # tsc -b resolves frontend/tsconfig.json, which references
      # tsconfig.app.json (src/) and tsconfig.node.json (vite.config.ts).
      # Both are checked in one pass; no Vite build required.
      - name: TypeScript type-check (tsc -b)
        working-directory: frontend
        run: pnpm run type-check

      - name: Run tests with coverage
        working-directory: frontend
        run: pnpm test -- --run --coverage

      - name: Upload frontend coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        # fail_ci_if_error: false — Codecov v6 CLI has a GPG key verification
        # issue on GitHub-hosted runners; treat upload failures as non-fatal
        # so infrastructure problems don't block PR merges.
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: leonarduk/allotmint
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Sitemap health check
        run: |
          pip install requests
          python scripts/site_healthcheck.py

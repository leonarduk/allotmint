name: Sync Changes Requested label

# The Claude, GPT, and DeepSeek PR review workflows each add the 'Changes Requested'
# label when their own verdict is "changes requested" (see
# claude-pr-review.yml / gpt-pr-review.yml / deepseek-pr-review.yml). Clearing it, however, can't
# safely happen from inside either of those jobs: a job's own check-run
# conclusion isn't finalized as 'success' until the job completes, and the
# label step runs *inside* that same job — so neither workflow can ever
# observe the other's conclusion as 'success' in time when both run
# concurrently on the same push (a structural chicken-and-egg race).
#
# This workflow runs *after* each review workflow completes, so by the time
# it runs for the last of the enabled reviewers, all conclusions are available.
# It only removes the label once ALL enabled AI review check runs for the
# current head SHA have concluded with 'success'.
#
# Individual reviewers can be disabled by setting repo variables:
#   ENABLE_CLAUDE_REVIEW=false
#   ENABLE_GPT_REVIEW=false
#   ENABLE_DEEPSEEK_REVIEW=false
# When a variable is 'false', the corresponding workflow job is skipped and
# no check-run is created; this workflow also excludes that reviewer.
#
# The workflow_run trigger can miss a PR (e.g. the triggering review run was
# cancelled by a superseding push before its "completed" event fired, or the
# webhook delivery was dropped), leaving the label "stuck" even though the
# latest commit's reviews all later succeeded. The scheduled job below sweeps
# every open PR still carrying the label as a fallback reconciliation pass —
# see docs/AI_REVIEW_WORKFLOWS.md#stuck-label-fallback.
on:
  workflow_run:
    workflows: ["Claude PR Review", "GPT PR Review", "DeepSeek PR Review"]
    types: [completed]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to reconcile (leave empty to sweep all open PRs)"
        required: false
        type: string

# Multiple review workflows (Claude/GPT/DeepSeek) can complete in rapid
# succession for the same PR, each triggering a workflow_run event that
# independently evaluates whether all reviews have concluded. Without
# serialization, two concurrent runs can both observe "all succeeded" before
# either removes the label, and both post a removal comment. Group by PR
# number so only one run per PR executes at a time. GitHub populates
# workflow_run.pull_requests for same-repo PRs; for the rare case it's empty
# (e.g. a fork-originated PR), fall back to head_sha rather than losing
# serialization entirely. The schedule/workflow_dispatch sweep falls back to
# the unique run_id so it's never cancelled by this group.
concurrency:
  group: sync-changes-requested-label-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  sync-label:
    if: github.event_name == 'workflow_run'
    name: Remove 'Changes Requested' label once all enabled reviews approve
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      checks: read
    env:
      ENABLE_CLAUDE: ${{ vars.ENABLE_CLAUDE_REVIEW || 'true' }}
      ENABLE_GPT: ${{ vars.ENABLE_GPT_REVIEW || 'true' }}
      ENABLE_DEEPSEEK: ${{ vars.ENABLE_DEEPSEEK_REVIEW || 'true' }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - name: Reconcile label against enabled review verdicts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PR_NUMBER=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/pulls" \
            --jq '[.[] | select(.state == "open")] | first | .number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for ${HEAD_SHA}; nothing to reconcile."
            exit 0
          fi

          bash .github/scripts/reconcile_changes_requested_label.sh "$PR_NUMBER"

  sync-label-scheduled:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: "[fallback] Sweep open PRs for stuck 'Changes Requested' labels"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      checks: read
    env:
      ENABLE_CLAUDE: ${{ vars.ENABLE_CLAUDE_REVIEW || 'true' }}
      ENABLE_GPT: ${{ vars.ENABLE_GPT_REVIEW || 'true' }}
      ENABLE_DEEPSEEK: ${{ vars.ENABLE_DEEPSEEK_REVIEW || 'true' }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - name: Reconcile label on every open PR that still carries it
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER_INPUT: ${{ github.event.inputs.pr_number }}
        run: |
          if [ -n "${PR_NUMBER_INPUT// }" ]; then
            echo "Reconciling single PR #${PR_NUMBER_INPUT} (workflow_dispatch input)."
            bash .github/scripts/reconcile_changes_requested_label.sh "$PR_NUMBER_INPUT"
            exit 0
          fi

          PR_NUMBERS=$(gh pr list --repo "$REPO" --state open --label "Changes Requested" \
            --json number --jq '.[].number')

          if [ -z "$PR_NUMBERS" ]; then
            echo "No open PRs carry the 'Changes Requested' label."
            exit 0
          fi

          for PR_NUMBER in $PR_NUMBERS; do
            bash .github/scripts/reconcile_changes_requested_label.sh "$PR_NUMBER"
          done

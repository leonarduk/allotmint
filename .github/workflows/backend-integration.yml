name: Backend Integration Tests

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  push:
    branches: [main]
    
permissions:
  contents: read
  id-token: write
  
jobs:
  integration-tests:
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      DATA_BUCKET: ${{ secrets.DATA_BUCKET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Check SPA contract version sync
        working-directory: .
        run: python scripts/check_contract_version_sync.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Optional: sync real S3 fixture data when credentials are available.
      # Skipped on forks and any env where the OIDC role / DATA_BUCKET secret
      # is absent. The pytest suite does not require this to pass - all AWS
      # interactions in tests/*_aws.py are covered by monkeypatched boto3 stubs.
      - name: Configure AWS credentials (optional)
        id: aws-auth
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync data from S3 (optional)
        if: ${{ steps.aws-auth.outcome == 'success' && env.DATA_BUCKET != '' }}
        run: |
          pip install awscli
          aws s3 sync "s3://$DATA_BUCKET/" data/

      - name: Type-check backend
        # --explicit-package-bases is required because of the root-level __init__.py
        # (added in #4840 so `backend.contracts_spa` imports resolve from the repo
        # root). Without it, mypy walks up from that __init__.py to infer a module
        # name from the checkout directory itself, which fails whenever that
        # directory name isn't a valid Python identifier (e.g. a worktree path
        # like allotmint-issue-4842 or any path containing a hyphen) with
        # "contains __init__.py but is not a valid Python package name".
        run: |
          test -f mypy.ini
          python -m mypy --version
          python -m mypy backend --config-file mypy.ini --show-error-codes --pretty --explicit-package-bases
      - name: Run provider parity tests
        env:
          ALLOTMINT_SKIP_SNAPSHOT_WARM: 'true'
        run: |
          pytest --no-cov tests/backend/common/test_data_provider_parity.py -q

      - name: Run tests
        env:
          ALLOTMINT_SKIP_SNAPSHOT_WARM: 'true'
        run: |
          python -m coverage erase
          pytest tests --ignore=tests/live --cov=backend --cov-report=xml --cov-report=term --cov-fail-under=80 -q
          pytest tests/test_backend_api.py::test_health tests/test_accounts_api.py --cov=backend --cov-append --cov-report=xml --cov-report=term --cov-fail-under=80 -q

      - name: Upload backend coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        # fail_ci_if_error: false — Codecov v6 CLI has a GPG key verification
        # issue on GitHub-hosted runners; treat upload failures as non-fatal
        # so infrastructure problems don't block PR merges.
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: leonarduk/allotmint
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

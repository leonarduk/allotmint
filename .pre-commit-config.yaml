default_language_version:
  python: python3
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: ["--fix"]
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
  - repo: local
    hooks:
      - id: log-sanitisation
        name: New logger calls must sanitise user-controlled values
        entry: python scripts/build_tools/check_new_log_sanitisation.py
        language: system
        types: [python]
        files: ^backend/
        exclude: ^backend/logging_setup\.py$
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        types: [python]
        pass_filenames: false

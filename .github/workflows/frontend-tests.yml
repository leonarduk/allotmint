name: Frontend Tests

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  push:
    branches: [main]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check SPA contract version sync
        run: python scripts/check_contract_version_sync.py

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript type-check (tsconfig.app.json)
        working-directory: frontend
        run: pnpm run type-check

      - name: Run tests with coverage
        working-directory: frontend
        run: pnpm test -- --run --coverage

      - name: Upload frontend coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: leonarduk/allotmint
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: true

      - name: Sitemap health check
        run: |
          pip install requests
          python scripts/site_healthcheck.py

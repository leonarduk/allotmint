name: Deploy Infrastructure

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (tag, branch, or SHA). Defaults to the ref that triggered this workflow.'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  check-ci:
    name: Verify CI passed on tagged commit
    runs-on: ubuntu-latest
    steps:
      - name: Check ci.yml passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Checking ci.yml status for commit ${COMMIT_SHA}..."

          # Helper function to call gh api with retry logic for transient failures
          gh_api_with_retry() {
            local max_attempts=5
            local attempt=1
            local wait_seconds=2
            local output

            while [ $attempt -le $max_attempts ]; do
              if output=$(gh api "$@"); then
                echo "$output"
                return 0
              fi

              if [ $attempt -lt $max_attempts ]; then
                echo "::warning::gh api call failed (attempt $attempt/$max_attempts), retrying in ${wait_seconds}s..." >&2
                sleep "$wait_seconds"
                wait_seconds=$((wait_seconds * 2))
              fi

              attempt=$((attempt + 1))
            done

            echo "::error::gh api call failed after $max_attempts attempts" >&2
            return 1
          }

          # Poll for the most recent ci.yml run on this exact commit and wait for
          # it to finish before deciding whether to proceed with the deploy.
          timeout_seconds=1800
          poll_interval=30
          elapsed=0
          while true; do
            run_json="$(gh_api_with_retry \
              "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${COMMIT_SHA}&per_page=10" \
              --jq '.workflow_runs | sort_by(.id) | reverse | .[0]')"

            if [ "${run_json}" = "null" ]; then
              echo "::error::No ci.yml run found for commit ${COMMIT_SHA}." \
                "Tag a commit that has a ci.yml run, or manually trigger ci.yml on this commit before tagging." >&2
              exit 1
            fi

            status="$(echo "${run_json}" | jq -r '.status')"
            conclusion="$(echo "${run_json}" | jq -r '.conclusion')"
            run_id="$(echo "${run_json}" | jq -r '.id')"

            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                echo "ci.yml run ${run_id} for ${COMMIT_SHA} succeeded — proceeding with deploy."
                break
              fi
              echo "::error::ci.yml run ${run_id} for commit ${COMMIT_SHA} did not succeed" \
                "(conclusion: ${conclusion})." >&2
              exit 1
            fi

            if [ "${elapsed}" -ge "${timeout_seconds}" ]; then
              echo "::error::Timed out after ${timeout_seconds}s waiting for ci.yml run ${run_id}" \
                "on commit ${COMMIT_SHA} to complete (status: ${status})." >&2
              exit 1
            fi

            echo "ci.yml run ${run_id} for ${COMMIT_SHA} is still ${status}; waiting ${poll_interval}s..."
            sleep "${poll_interval}"
            elapsed=$((elapsed + poll_interval))
          done

  deploy:
    runs-on: ubuntu-latest
    needs: check-ci
    env:
      LIGHTHOUSE_URL: ${{ vars.LIGHTHOUSE_URL }}
    outputs:
      backend_url: ${{ steps.get_backend_url.outputs.backend_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Use a clean venv so runner pre-installs cannot mask genuine conflicts.
      # Upgrade pip first: --dry-run was added in pip 23.1 and is silently
      # ignored on older versions, which would let a broken file pass.
      - name: Validate backend/requirements.txt is resolvable (pre-deploy)
        run: |
          python -m venv /tmp/validate-venv
          /tmp/validate-venv/bin/pip install --upgrade pip
          /tmp/validate-venv/bin/pip --version
          if ! /tmp/validate-venv/bin/pip install --dry-run -r backend/requirements.txt; then
            echo "::error file=backend/requirements.txt::Dependency conflict detected — Docker build will fail. Check pip output above for the conflicting packages."
            exit 1
          fi

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify required AWS secrets
        run: |
          missing=0
          if [ -z "${{ secrets.AWS_REGION }}${{ vars.AWS_REGION }}" ]; then
            echo "AWS_REGION is not configured (set as secret or repository variable)" >&2
            missing=1
          fi
          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME }}${{ vars.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "AWS_ROLE_TO_ASSUME is not configured (set as secret or repository variable)" >&2
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then exit 1; fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION || vars.AWS_REGION }}

      - name: Pre-flight IAM permission check
        # Verifies that the deploy role has every permission needed by this
        # workflow before spending ~8 minutes on CDK deploy.
        # Each action is simulated against the *same* resource ARN(s) (and, where
        # relevant, condition context) that the CDK-managed grants actually scope
        # the permission to. The deploy role's grants are narrowly scoped per
        # stack/function/log-group/object (see GithubDeployRolePolicy* and
        # allotmint-deploy-permissions), so simulating against "*" produces false
        # implicitDeny results even when the real `cdk deploy`/sync steps below
        # would succeed. See issue #3910.
        # If the role itself lacks iam:SimulatePrincipalPolicy the simulate
        # call returns an error, which is surfaced as a distinct message so the
        # operator knows to add that meta-permission to the base role.
        env:
          DEPLOY_ROLE_ARN: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          set -euo pipefail

          data_bucket="$(aws cloudformation list-stack-resources \
            --stack-name BackendLambdaStack \
            --query "StackResourceSummaries[?starts_with(LogicalResourceId,'PortfolioDataBucket')].PhysicalResourceId|[0]" \
            --output text 2>/dev/null || echo "")"
          if [ -z "$data_bucket" ] || [ "$data_bucket" = "None" ]; then
            echo "::notice::BackendLambdaStack not yet deployed or PortfolioDataBucket not found; using wildcard resource for permission checks."
            data_bucket="*"
          fi

          backend_stack_arn="$(aws cloudformation describe-stacks \
            --stack-name BackendLambdaStack --query "Stacks[0].StackId" --output text 2>/dev/null || echo "")"
          static_site_stack_arn="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack --query "Stacks[0].StackId" --output text 2>/dev/null || echo "")"
          if [ -z "$backend_stack_arn" ] || [ "$backend_stack_arn" = "None" ]; then
            backend_stack_arn="*"
          fi
          if [ -z "$static_site_stack_arn" ] || [ "$static_site_stack_arn" = "None" ]; then
            static_site_stack_arn="*"
          fi

          price_refresh_alias_arn="$(aws cloudformation list-stack-resources \
            --stack-name BackendLambdaStack \
            --query "StackResourceSummaries[?starts_with(LogicalResourceId,'PriceRefreshLambdaLiveAlias')].PhysicalResourceId|[0]" \
            --output text 2>/dev/null || echo "")"
          if [ -z "$price_refresh_alias_arn" ] || [ "$price_refresh_alias_arn" = "None" ]; then
            price_refresh_alias_arn="*"
          fi

          backend_log_group="$(aws cloudformation list-stack-resources \
            --stack-name BackendLambdaStack \
            --query "StackResourceSummaries[?starts_with(LogicalResourceId,'BackendLambdaLogGroup')].PhysicalResourceId|[0]" \
            --output text 2>/dev/null || echo "")"
          account_id="$(aws sts get-caller-identity --query Account --output text 2>/dev/null || echo "")"
          if [ -z "$backend_log_group" ] || [ "$backend_log_group" = "None" ] || [ -z "$account_id" ]; then
            backend_log_group_arn="*"
          else
            # aws-actions/configure-aws-credentials sets AWS_REGION/AWS_DEFAULT_REGION
            # env vars rather than writing the CLI config file, so check those first;
            # fall back to `aws configure get region` for local/manual runs.
            region="${AWS_REGION:-${AWS_DEFAULT_REGION:-$(aws configure get region)}}"
            backend_log_group_arn="arn:aws:logs:${region}:${account_id}:log-group:${backend_log_group}:*"
          fi

          if [ "$data_bucket" = "*" ]; then
            get_object_resource="*"
            list_bucket_resource="*"
          else
            # GithubDeployRoleForLambdaInvokePolicy's ReadPriceSnapshot statement
            # grants s3:GetObject on this exact key only (not a prefix wildcard),
            # so this is the only object the deploy role can read.
            get_object_resource="arn:aws:s3:::${data_bucket}/prices/latest_prices.json"
            list_bucket_resource="arn:aws:s3:::${data_bucket}"
          fi

          # Each entry: "action|resource arns (space-separated)|context key=value (optional)"
          # cloudformation:* and s3:ListBucket use grants that aren't visible from a
          # single resource: the changeset perms cover both stacks, and ListBucket is
          # conditioned on an s3:prefix. Pass both stack ARNs / the matching condition
          # so simulate-principal-policy evaluates the grant CDK actually created.
          checks=(
            "cloudformation:CreateChangeSet|${backend_stack_arn} ${static_site_stack_arn}|"
            "cloudformation:DescribeChangeSet|${backend_stack_arn} ${static_site_stack_arn}|"
            "cloudformation:DeleteChangeSet|${backend_stack_arn} ${static_site_stack_arn}|"
            "lambda:InvokeFunction|${price_refresh_alias_arn}|"
            "s3:ListBucket|${list_bucket_resource}|s3:prefix=prices"
            "s3:GetObject|${get_object_resource}|"
            "logs:FilterLogEvents|${backend_log_group_arn}|"
          )

          failed=0
          simulate_unavailable=0
          for check in "${checks[@]}"; do
            IFS='|' read -r action resources context <<< "$check"
            # Word-split intentionally: $resources is a space-separated list of one
            # or more ARNs (e.g. both stack ARNs for the changeset checks).
            read -r -a resource_arr <<< "$resources"
            context_args=()
            if [ -n "$context" ]; then
              context_key="${context%%=*}"
              context_value="${context#*=}"
              context_args=(--context-entries "ContextKeyName=${context_key},ContextKeyValues=${context_value},ContextKeyType=string")
            fi
            # || true prevents set -e from aborting; 2>&1 already captures the real
            # AWS error into raw_result. Using || raw_result="error" would overwrite
            # the actual message and break the AccessDenied/SimulatePrincipalPolicy
            # detection below. See issue #3226.
            raw_result="$(aws iam simulate-principal-policy \
              --policy-source-arn "$DEPLOY_ROLE_ARN" \
              --action-names "$action" \
              --resource-arns "${resource_arr[@]}" \
              "${context_args[@]}" \
              --query "EvaluationResults[].EvalDecision" --output text 2>&1)" || true
            # Multiple resource ARNs come back tab-separated on one line; every one
            # must be "allowed" for the action to be considered granted.
            results="$(echo "$raw_result" | tail -1 | tr '\t' '\n')"
            # Distinguish three cases:
            # 1. AccessDenied specifically for iam:SimulatePrincipalPolicy itself —
            #    role lacks the meta-permission; degrade gracefully so the bootstrap
            #    deploy that grants it can still proceed. See issue #3208.
            #    Require BOTH "AccessDenied" AND "SimulatePrincipalPolicy" so that
            #    throttling errors mentioning the operation name don't silently degrade.
            # 2. Any other AWS error (throttling, network, malformed ARN, etc.) —
            #    hard-fail: something unexpected is wrong and masking it is dangerous.
            # 3. Successful call returning a non-"allowed" decision —
            #    hard-fail: the role genuinely lacks the checked permission.
            if echo "$raw_result" | grep -qi "AccessDenied" && \
               echo "$raw_result" | grep -qi "SimulatePrincipalPolicy"; then
              echo "::warning::simulate-principal-policy unavailable for $action — deploy role lacks iam:SimulatePrincipalPolicy. Run scripts/bash/bootstrap-deploy-role.sh to fix. See issue #3208." >&2
              echo "  Raw AWS response: $raw_result" >&2
              simulate_unavailable=1
            elif echo "$raw_result" | grep -qi "exception\|error\|AccessDenied"; then
              # Use $raw_result (full response) not $results (last line only) to catch
              # multi-line AWS error payloads where the error type is on line 1.
              echo "::error::simulate-principal-policy call failed unexpectedly for $action. Raw response: $raw_result" >&2
              failed=1
            elif echo "$results" | grep -qv "^allowed$"; then
              echo "::error::Deploy role is missing $action on $resources (got: $(echo "$results" | tr '\n' ' ')). Fix the CDK grant or base role policy before deploying." >&2
              failed=1
            fi
          done
          if [ "$simulate_unavailable" -eq 1 ] && [ "$failed" -eq 0 ]; then
            echo "::warning::Pre-flight check skipped — deploy role lacks iam:SimulatePrincipalPolicy. Run scripts/bash/bootstrap-deploy-role.sh to enable full pre-flight checks. See issue #3208." >&2
          fi
          [ "$failed" -eq 0 ] || exit 1

      - name: Sync data from S3
        env:
          DATA_BUCKET: ${{ secrets.DATA_BUCKET }}
        run: aws s3 sync "s3://$DATA_BUCKET/" data/

      - name: Verify DATA_BUCKET secret
        env:
          DATA_BUCKET: ${{ secrets.DATA_BUCKET }}
        run: |
          if [ -z "$DATA_BUCKET" ]; then
            echo "DATA_BUCKET secret is not configured" >&2
            exit 1
          fi

      - name: CDK diff
        # Use --method=template: a direct template comparison that creates no
        # CloudFormation change set. BackendLambdaStack declares UiAuthUserPoolId
        # and UiAuthUserPoolClientId as required parameters with no default
        # (backend_lambda_stack.py); their values are produced by StaticSiteStack
        # and only fetched in the "Get Cognito UI auth outputs" step *below*, so
        # they are unavailable at diff time. The "change-set"/"auto" methods try
        # to create a change set, which fails here because cdk diff has no
        # --parameters flag and does not send UsePreviousValue, so CloudFormation
        # reports UiAuthUserPoolId/UiAuthUserPoolClientId as missing a value
        # (see issue #3287). The diff is informational only; the real cdk deploy
        # steps below still pass the actual parameter values.
        env:
          DATA_BUCKET: ${{ secrets.DATA_BUCKET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GITHUB_DEPLOY_ROLE_ARN: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          CDK_OUTDIR: /tmp/cdk.out.${{ github.run_id }}.${{ github.run_attempt }}
        run: npx cdk diff BackendLambdaStack StaticSiteStack --method=template -c prod=true
        working-directory: cdk

      - name: Deploy StaticSiteStack auth resources
        # GITHUB_DEPLOY_ROLE_ARN must be set here so CDK can synthesize the
        # deploy-role IAM grants in static_site_stack.py (SimulatePrincipalPolicy,
        # changeset perms, cognito-idp Describe/UpdateUserPoolClient). Without it,
        # those grants are silently omitted from the deployed StaticSiteStack
        # template and every dependent step (e.g. "Reconcile UiAuthClient OAuth
        # configuration") fails with AccessDenied. See #3846.
        env:
          DATA_BUCKET: ${{ secrets.DATA_BUCKET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GITHUB_DEPLOY_ROLE_ARN: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          CDK_OUTDIR: /tmp/cdk.out.${{ github.run_id }}.${{ github.run_attempt }}
        run: npx cdk deploy StaticSiteStack --require-approval never -c prod=true
        working-directory: cdk

      - name: Get Cognito UI auth outputs
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          UI_AUTH_USER_POOL_ID="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack \
            --query "Stacks[0].Outputs[?OutputKey=='UiAuthUserPoolId'].OutputValue" \
            --output text)"
          UI_AUTH_USER_POOL_CLIENT_ID="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack \
            --query "Stacks[0].Outputs[?OutputKey=='UiAuthUserPoolClientId'].OutputValue" \
            --output text)"
          # DistributionDomain is the CloudFront domain the frontend is actually served
          # from (customDomain is currently disabled — see cdk.json). BackendLambdaStack
          # needs this as FRONTEND_ORIGIN so its CORS allow-list includes the live
          # frontend origin (see #3944); without it, cors_origins defaults to
          # localhost-only and the deployed frontend's GET /config never gets an
          # Access-Control-Allow-Origin header, leaving it stuck on
          # "Loading... retrying configuration."
          DISTRIBUTION_DOMAIN="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomain'].OutputValue" \
            --output text)"
          # Sanitise DISTRIBUTION_DOMAIN to guarantee bare-hostname format (no scheme, no trailing slash).
          # This guards against future CDK output changes that might include a scheme (e.g.,
          # https://d32n5ua14kb82t.cloudfront.net) or trailing artifacts from shell capture.
          # Defensive strip operations ensure FRONTEND_ORIGIN is always https://<bare-hostname>.
          DISTRIBUTION_DOMAIN="${DISTRIBUTION_DOMAIN#https://}"
          DISTRIBUTION_DOMAIN="${DISTRIBUTION_DOMAIN#http://}"
          DISTRIBUTION_DOMAIN="${DISTRIBUTION_DOMAIN%/}"
          DISTRIBUTION_DOMAIN="$(echo "$DISTRIBUTION_DOMAIN" | xargs)"
          # SmokeTestUserPoolClientId is the deploy workflow's dedicated Cognito app
          # client for post-deploy smoke tests (see "Fetch Cognito smoke-test token"
          # below). BackendLambdaStack must accept its tokens as a valid JWT audience,
          # otherwise every Cognito-protected route (e.g. /groups) returns 401 for the
          # smoke test token (#4027). Optional: the deploy still succeeds if this
          # output is missing, but smoke tests will then see 401s on protected routes.
          SMOKE_TEST_USER_POOL_CLIENT_ID="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack \
            --query "Stacks[0].Outputs[?OutputKey=='SmokeTestUserPoolClientId'].OutputValue" \
            --output text 2>/dev/null || echo "")"
          if [ "$SMOKE_TEST_USER_POOL_CLIENT_ID" = "None" ]; then
            SMOKE_TEST_USER_POOL_CLIENT_ID=""
          fi
          # UiAuthDomain is the Cognito hosted-UI base URL surfaced in the backend's
          # /config response as awsUiAuth.domain so the frontend can initiate PKCE
          # login (issue #4577). Optional: if the output is missing the parameter
          # defaults to empty and awsUiAuth is omitted from /config.
          UI_AUTH_DOMAIN="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack \
            --query "Stacks[0].Outputs[?OutputKey=='UiAuthDomain'].OutputValue" \
            --output text 2>/dev/null || echo "")"
          if [ "$UI_AUTH_DOMAIN" = "None" ]; then
            UI_AUTH_DOMAIN=""
          fi
          if [ -z "$UI_AUTH_USER_POOL_ID" ] || [ "$UI_AUTH_USER_POOL_ID" = "None" ]; then
            echo "UiAuthUserPoolId output is missing from StaticSiteStack" >&2
            exit 1
          fi
          if [ -z "$UI_AUTH_USER_POOL_CLIENT_ID" ] || [ "$UI_AUTH_USER_POOL_CLIENT_ID" = "None" ]; then
            echo "UiAuthUserPoolClientId output is missing from StaticSiteStack" >&2
            exit 1
          fi
          if [ -z "$DISTRIBUTION_DOMAIN" ] || [ "$DISTRIBUTION_DOMAIN" = "None" ]; then
            echo "DistributionDomain output is missing from StaticSiteStack" >&2
            exit 1
          fi
          {
            echo "UI_AUTH_USER_POOL_ID=$UI_AUTH_USER_POOL_ID"
            echo "UI_AUTH_USER_POOL_CLIENT_ID=$UI_AUTH_USER_POOL_CLIENT_ID"
            echo "SMOKE_TEST_USER_POOL_CLIENT_ID=$SMOKE_TEST_USER_POOL_CLIENT_ID"
            echo "UI_AUTH_DOMAIN=${UI_AUTH_DOMAIN}"
            echo "FRONTEND_ORIGIN=https://${DISTRIBUTION_DOMAIN}"
            echo "CORS_ORIGINS=https://${DISTRIBUTION_DOMAIN},https://app.allotmint.io"
          } >> "$GITHUB_ENV"

      - name: Deploy BackendLambdaStack
        # GITHUB_DEPLOY_ROLE_ARN must be set here so CDK can read it during synthesis.
        # backend_lambda_stack.py calls os.getenv("GITHUB_DEPLOY_ROLE_ARN") at synth time
        # (not at deploy time) to grant lambda:InvokeFunction on the PriceRefreshLambda live
        # alias (PR #3368). If the variable is absent during synthesis, the grant is silently
        # omitted from the CloudFormation template and the "Warm price snapshot" step will fail.
        # AWS_ROLE_TO_ASSUME is this workflow's GitHub Actions deploy role ARN — the same
        # principal that invokes the Lambda in the "Warm price snapshot" step below, so it is
        # the correct ARN to grant invoke permission to.
        env:
          DATA_BUCKET: ${{ secrets.DATA_BUCKET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GITHUB_DEPLOY_ROLE_ARN: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          CDK_OUTDIR: /tmp/cdk.out.${{ github.run_id }}.${{ github.run_attempt }}
          FRONTEND_ORIGIN: ${{ env.FRONTEND_ORIGIN }}
          CORS_ORIGINS: ${{ env.CORS_ORIGINS }}
        run: >
          npx cdk deploy BackendLambdaStack --require-approval never
          --parameters BackendLambdaStack:UiAuthUserPoolId="$UI_AUTH_USER_POOL_ID"
          --parameters BackendLambdaStack:UiAuthUserPoolClientId="$UI_AUTH_USER_POOL_CLIENT_ID"
          --parameters BackendLambdaStack:SmokeTestUserPoolClientId="$SMOKE_TEST_USER_POOL_CLIENT_ID"
          --parameters BackendLambdaStack:UiAuthDomain="${UI_AUTH_DOMAIN}"
        working-directory: cdk

      - name: Warm price snapshot
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          refresh_fn="$(aws cloudformation list-stack-resources \
            --stack-name BackendLambdaStack \
            --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function' && starts_with(LogicalResourceId, 'PriceRefreshLambda')].PhysicalResourceId | [0]" \
            --output text)"
          if [ -z "$refresh_fn" ] || [ "$refresh_fn" = "None" ]; then
            echo "Unable to resolve PriceRefreshLambda physical function name from BackendLambdaStack resources" >&2
            exit 1
          fi
          data_bucket="$(aws cloudformation list-stack-resources \
            --stack-name BackendLambdaStack \
            --query "StackResourceSummaries[?ResourceType=='AWS::S3::Bucket' && starts_with(LogicalResourceId, 'PortfolioDataBucket')].PhysicalResourceId | [0]" \
            --output text)"
          if [ -z "$data_bucket" ] || [ "$data_bucket" = "None" ]; then
            echo "Unable to resolve PortfolioDataBucket physical bucket name from BackendLambdaStack resources" >&2
            exit 1
          fi
          response_file="$(mktemp)"
          invoke_meta="$(aws lambda invoke \
            --function-name "${refresh_fn}:live" \
            "$response_file")"
          python - "$invoke_meta" "$response_file" <<'PY'
          import json
          import pathlib
          import sys

          meta = json.loads(sys.argv[1])
          payload_text = pathlib.Path(sys.argv[2]).read_text(encoding="utf-8").strip()
          if meta.get("FunctionError"):
              raise SystemExit(
                  f"PriceRefreshLambda returned {meta['FunctionError']}: {payload_text or '<empty>'}"
              )
          payload = json.loads(payload_text or "{}")
          if not isinstance(payload, dict) or "snapshot" not in payload or "timestamp" not in payload:
              raise SystemExit(f"Unexpected PriceRefreshLambda response: {payload!r}")
          PY
          # Retry with backoff: the Lambda write may lag the invocation response.
          # With s3:ListBucket now granted to the deploy role (issue #3191), a
          # missing key returns 404 (retryable) instead of 403 (hard failure).
          # 403 means a genuine permission problem — retrying will never help.
          for attempt in 1 2 3 4 5; do
            head_out="$(aws s3api head-object --bucket "$data_bucket" --key prices/latest_prices.json 2>&1)" && break
            if echo "$head_out" | grep -q "(403)"; then
              echo "head-object returned 403 Forbidden — deploy role lacks s3:GetObject or s3:ListBucket on the data bucket. Check CDK grants for GITHUB_DEPLOY_ROLE_ARN. See issue #3191." >&2
              echo "$head_out" >&2
              exit 1
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "head-object failed on attempt 5/5; giving up." >&2
              echo "$head_out" >&2
              exit 1
            fi
            echo "head-object attempt $attempt/5 failed (key not yet written); retrying in 20s..." >&2
            sleep 20
          done

      - name: Get backend API URL
        id: get_backend_url
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          BACKEND_URL="$(aws cloudformation describe-stacks \
            --stack-name BackendLambdaStack \
            --query "Stacks[0].Outputs[?OutputKey=='BackendApiUrl'].OutputValue" \
            --output text)"
          if [ -z "$BACKEND_URL" ] || [ "$BACKEND_URL" = "None" ]; then
            echo "BackendApiUrl output is missing from BackendLambdaStack" >&2
            exit 1
          fi
          echo "BACKEND_URL=$BACKEND_URL" >> "$GITHUB_ENV"
          # SMOKE_TEST_URL is consumed by the Run Lighthouse CI step further below.
          # BACKEND_URL is read from BackendLambdaStack/BackendApiUrl (describe-stacks
          # query above) and validated non-empty, so SMOKE_TEST_URL is always the live
          # backend API URL as required by issue #3193.
          echo "SMOKE_TEST_URL=$BACKEND_URL" >> "$GITHUB_ENV"
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"

      - name: Verify CORS configuration
        # Validates the CORS fix from PR #3954: BackendLambdaStack's /config
        # route must echo back FRONTEND_ORIGIN (the CloudFront distribution
        # domain) in Access-Control-Allow-Origin when called with a matching
        # Origin header. If the CDK code path fails to pick up FRONTEND_ORIGIN,
        # this would otherwise pass CI silently and break the deployed
        # frontend (stuck on "Loading... retrying configuration"). See #3984.
        run: |
          set -euo pipefail
          echo "Checking CORS headers on ${BACKEND_URL%/}/config for Origin: ${FRONTEND_ORIGIN}"
          headers_file="$(mktemp)"
          trap 'rm -f "$headers_file"' EXIT
          status="$(curl --retry 3 --retry-delay 5 --retry-all-errors \
            --max-time 60 --silent --output /dev/null --write-out "%{http_code}" \
            -D "$headers_file" \
            -H "Origin: ${FRONTEND_ORIGIN}" \
            "${BACKEND_URL%/}/config")"
          if [ "$status" != "200" ]; then
            echo "::error::Expected HTTP 200 from ${BACKEND_URL%/}/config, got $status" >&2
            cat "$headers_file" >&2
            exit 1
          fi
          cors_header="$( (grep -i '^access-control-allow-origin:' "$headers_file" || true) | tail -n 1 | tr -d '\r' | sed 's/^[^:]*: *//')"
          if [ -z "$cors_header" ]; then
            echo "::error::Access-Control-Allow-Origin header missing from ${BACKEND_URL%/}/config response" >&2
            cat "$headers_file" >&2
            exit 1
          fi
          if [ "$cors_header" != "${FRONTEND_ORIGIN}" ]; then
            echo "::error::Access-Control-Allow-Origin mismatch: expected ${FRONTEND_ORIGIN}, got ${cors_header}" >&2
            cat "$headers_file" >&2
            exit 1
          fi
          echo "CORS configuration OK: Access-Control-Allow-Origin: ${cors_header}"

      - name: Refresh StaticSiteStack runtime config
        # GITHUB_DEPLOY_ROLE_ARN must be set here too (see "Deploy StaticSiteStack
        # auth resources" above and #3846): without it, this redeploy of
        # StaticSiteStack synthesizes a template that omits the deploy-role IAM
        # grants (SimulatePrincipalPolicy, changeset perms, cognito-idp Describe/
        # UpdateUserPoolClient), and CloudFormation deletes the policy resource
        # that the earlier step just created — right before the "Reconcile
        # UiAuthClient OAuth configuration" step needs it.
        env:
          DATA_BUCKET: ${{ secrets.DATA_BUCKET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GITHUB_DEPLOY_ROLE_ARN: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          CDK_OUTDIR: /tmp/cdk.out.${{ github.run_id }}.${{ github.run_attempt }}
        run: >
          npx cdk deploy StaticSiteStack --require-approval never -c prod=true
          --parameters StaticSiteStack:BackendApiUrl="$BACKEND_URL"
        working-directory: cdk

      - name: Set LIGHTHOUSE_URL for Lighthouse CI
        # LIGHTHOUSE_URL is consumed by the Run Lighthouse CI step below.
        # Lighthouse CI audits HTML page performance — it requires the CloudFront
        # frontend URL, not the backend API Gateway URL.  npm run smoke:test uses
        # SMOKE_URL (the backend URL); LIGHTHOUSE_URL is a separate variable only
        # used here.  Issue #3193 mentioned BackendApiUrl but that was a mistake in
        # the issue description: pointing Lighthouse at the API Gateway returns
        # Cognito 401s, not auditable HTML pages.
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          FRONTEND_DOMAIN="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomain'].OutputValue" \
            --output text)"
          if [ -z "$FRONTEND_DOMAIN" ] || [ "$FRONTEND_DOMAIN" = "None" ]; then
            echo "DistributionDomain output is missing from StaticSiteStack" >&2
            exit 1
          fi
          echo "LIGHTHOUSE_URL=https://${FRONTEND_DOMAIN}" >> "$GITHUB_ENV"
          echo "FRONTEND_DOMAIN=${FRONTEND_DOMAIN}" >> "$GITHUB_ENV"

      - name: Reconcile UiAuthClient OAuth configuration
        # cognito-idp:UpdateUserPoolClient replaces ALL writable client attributes in
        # one call (no partial update). If the live UiAuthClient is ever edited
        # out-of-band (console, manual CLI call) without setting every OAuth field,
        # CallbackURLs/LogoutURLs/AllowedOAuthFlows/AllowedOAuthScopes/
        # SupportedIdentityProviders silently get wiped to empty/false. Because the
        # CDK template itself hasn't changed, `cdk deploy` does not detect or correct
        # this drift, and the Cognito Hosted UI then rejects every login with
        # redirect_mismatch (400) — which is exactly what broke Lighthouse CI in
        # #3802. Re-apply the CDK-declared OAuth settings (must match the
        # `o_auth=...` block on UiAuthClient in cdk/stacks/static_site_stack.py) on
        # every deploy so this can never silently recur.
        #
        # CALLBACK_URL assumes the non-customDomain deployment path (the only one
        # this workflow uses today): `https://${FRONTEND_DOMAIN}/`, matching
        # ui_auth_callback_url's `_enable_custom_domain=False` branch. If this
        # workflow is ever changed to deploy with `-c customDomain=true`, this step
        # must be updated to use the custom domain URL instead.
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          USER_POOL_ID="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack \
            --query "Stacks[0].Outputs[?OutputKey=='UiAuthUserPoolId'].OutputValue" \
            --output text)"
          CLIENT_ID="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack \
            --query "Stacks[0].Outputs[?OutputKey=='UiAuthUserPoolClientId'].OutputValue" \
            --output text)"
          if [ -z "$USER_POOL_ID" ] || [ "$USER_POOL_ID" = "None" ] \
            || [ -z "$CLIENT_ID" ] || [ "$CLIENT_ID" = "None" ]; then
            echo "UiAuthUserPoolId/UiAuthUserPoolClientId outputs missing from StaticSiteStack" >&2
            exit 1
          fi
          if [ -z "${FRONTEND_DOMAIN:-}" ]; then
            echo "FRONTEND_DOMAIN is unset; refusing to write an empty CallbackURL" >&2
            exit 1
          fi
          # Retry on AccessDeniedException: the StaticSiteStack deploy above just
          # created/updated the deploy role's cognito-idp:DescribeUserPoolClient /
          # UpdateUserPoolClient grant, and IAM policy changes are eventually
          # consistent — a freshly granted permission may not be visible to the
          # very next API call for up to a minute or two. Any other failure, or
          # exhausting all attempts, fails immediately. See #3858.
          cognito_retry() {
            local desc="$1"; shift
            local attempt out
            for attempt in 1 2 3 4 5; do
              if out="$("$@" 2>&1)"; then
                printf '%s' "$out"
                return 0
              fi
              if ! echo "$out" | grep -q "AccessDeniedException"; then
                echo "$out" >&2
                return 1
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "::error::$desc failed after 5 attempts with AccessDeniedException. Check the cognito-idp:DescribeUserPoolClient/UpdateUserPoolClient grant for the deploy role in cdk/stacks/static_site_stack.py." >&2
                echo "$out" >&2
                return 1
              fi
              echo "$desc attempt $attempt/5 failed with AccessDeniedException (IAM propagation lag); retrying in 15s..." >&2
              sleep 15
            done
          }
          CLIENT_NAME="$(cognito_retry "describe-user-pool-client" aws cognito-idp describe-user-pool-client \
            --user-pool-id "$USER_POOL_ID" --client-id "$CLIENT_ID" \
            --query "UserPoolClient.ClientName" --output text)"
          CALLBACK_URL="https://${FRONTEND_DOMAIN}/"
          UPDATE_FILE="$(mktemp)"
          trap 'rm -f "$UPDATE_FILE"' EXIT
          # Build the payload with jq (not a heredoc) so CLIENT_NAME is JSON-escaped;
          # a client name containing a quote or backslash would otherwise produce
          # malformed --cli-input-json.
          #
          # RefreshTokenValidity (30 days) and AuthSessionValidity (3 minutes) are
          # the AWS API defaults, applied identically whether or not CDK specifies
          # them; UiAuthClient's o_auth=... block in static_site_stack.py does not
          # override either, so this matches the CDK-declared (and currently
          # deployed) state. AccessTokenValidity/IdTokenValidity are likewise left
          # unset here and in CDK, so they fall back to the same 1-hour API default
          # on both sides. If UiAuthClient ever sets any of these explicitly, this
          # payload must be updated to match.
          jq -n \
            --arg userPoolId "$USER_POOL_ID" \
            --arg clientId "$CLIENT_ID" \
            --arg clientName "$CLIENT_NAME" \
            --arg callbackUrl "$CALLBACK_URL" \
            '{
              UserPoolId: $userPoolId,
              ClientId: $clientId,
              ClientName: $clientName,
              RefreshTokenValidity: 30,
              ExplicitAuthFlows: ["ALLOW_USER_SRP_AUTH", "ALLOW_REFRESH_TOKEN_AUTH"],
              SupportedIdentityProviders: ["COGNITO"],
              CallbackURLs: [$callbackUrl],
              LogoutURLs: [$callbackUrl],
              AllowedOAuthFlows: ["code"],
              AllowedOAuthScopes: ["email", "openid", "profile"],
              AllowedOAuthFlowsUserPoolClient: true,
              PreventUserExistenceErrors: "ENABLED",
              EnableTokenRevocation: true,
              EnablePropagateAdditionalUserContextData: false,
              AuthSessionValidity: 3
            }' > "$UPDATE_FILE"
          cognito_retry "update-user-pool-client" aws cognito-idp update-user-pool-client --cli-input-json "file://${UPDATE_FILE}" >/dev/null
          echo "UiAuthClient ($CLIENT_ID) OAuth configuration reconciled to ${CALLBACK_URL}"

      - name: Verify price snapshot seeded in S3
        # Belt-and-suspenders check after the CDK Trigger (REQUEST_RESPONSE) has
        # already blocked the deploy until PriceRefreshLambda finishes.  If the
        # snapshot is still absent here it means the Trigger Lambda failed or timed
        # out; print a clear, actionable warning so operators know exactly what
        # to do rather than hunting through CloudWatch logs.
        #
        # A missing key (NoSuchKey/404) is a soft pass: the price-refresh job
        # hasn't run yet, which is recoverable. Any other error (403, 500,
        # network timeout, etc.) indicates a genuine configuration problem
        # (e.g. a misconfigured bucket policy) that will only get harder to
        # diagnose later in the deploy, so it is treated as a hard failure.
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
          DATA_BUCKET: ${{ secrets.DATA_BUCKET || vars.DATA_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_BUCKET:-}" ]; then
            echo "DATA_BUCKET not set; skipping price snapshot verification." >&2
            exit 0
          fi
          head_output="$(aws s3api head-object \
              --bucket "$DATA_BUCKET" \
              --key "prices/latest_prices.json" 2>&1)" && head_exit=0 || head_exit=$?
          if [ "$head_exit" -eq 0 ]; then
            echo "Price snapshot prices/latest_prices.json is present in s3://${DATA_BUCKET} — OK"
          elif echo "$head_output" | grep -qi "NoSuchKey\|Not Found\|404"; then
            echo "::warning::Price snapshot prices/latest_prices.json is NOT present in s3://${DATA_BUCKET}. Portfolio prices will be unavailable until the price-refresh job runs. Trigger it manually: aws lambda invoke --function-name <PriceRefreshLambda-physical-name>:live /dev/null"
          else
            echo "ERROR: S3 bucket access check failed: head-object returned exit ${head_exit}: ${head_output}" >&2
            exit 1
          fi

      - name: Warm up backend Lambda (absorb cold-start before validation)
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        continue-on-error: true
        run: |
          if [ -z "${BACKEND_URL:-}" ]; then
            echo "BACKEND_URL is not set; skipping warm-up probe." >&2
            exit 0
          fi
          # Lambda container init takes ~24 s on a fresh deploy (heavy imports: pandas,
          # pyarrow, yfinance, selenium). AWS kills the first container after 10 s and
          # retries with a second instance. Send a probe with generous retries so the
          # cold-start completes before the strict validation gate runs below.
          echo "Sending warm-up probe to ${BACKEND_URL%/}/health (cold-start may take up to 40 s per attempt)..."
          # --fail: makes curl exit non-zero on HTTP 4xx/5xx so that --retry-all-errors
          # retries on cold-start 502/504 responses (without --fail, curl exits 0 on
          # any HTTP response and the warm-up would prematurely consider a 502 a success).
          # --max-time 40: short enough that a hung first attempt (API Gateway holding
          # the connection while Lambda init is killed) times out quickly.
          # --retry-max-time 150: hard wall-clock cap across all attempts; the 4th
          # attempt may be cut short if earlier attempts consume the budget.
          curl --retry 3 --retry-delay 10 --retry-all-errors --fail \
            --retry-max-time 150 --max-time 40 --silent --output /dev/null \
            "${BACKEND_URL%/}/health" \
            && echo "Warm-up probe succeeded." \
            || echo "Warm-up probe finished with non-zero exit (tolerated — validation step will assert)."
          # Record METRIC_START *after* the warm-up curl so cold-start init-timeout
          # errors land before the window and are excluded from the error-rate gate.
          echo "METRIC_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Validate backend and frontend endpoints
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          backend_url="$(aws cloudformation describe-stacks \
            --stack-name BackendLambdaStack \
            --query "Stacks[0].Outputs[?OutputKey=='BackendApiUrl'].OutputValue" \
            --output text)"
          frontend_domain="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomain'].OutputValue" \
            --output text)"
          if [ -z "$backend_url" ] || [ "$backend_url" = "None" ]; then
            echo "BackendApiUrl output is missing from BackendLambdaStack" >&2
            exit 1
          fi
          if [ -z "$frontend_domain" ] || [ "$frontend_domain" = "None" ]; then
            echo "DistributionDomain output is missing from StaticSiteStack" >&2
            exit 1
          fi
          echo "Checking /health → ${backend_url%/}/health"
          curl_exit=0
          status=$(curl --retry 3 --retry-delay 5 --retry-all-errors \
            --max-time 60 --write-out "%{http_code}" --silent --output /dev/null \
            "${backend_url%/}/health") || curl_exit=$?
          if [ "$curl_exit" -ne 0 ]; then
            echo "curl failed (exit ${curl_exit}) checking ${backend_url%/}/health" >&2
            exit 1
          fi
          if [ "$status" != "200" ]; then
            echo "Expected HTTP 200 from unauthenticated /health endpoint, got $status" >&2
            exit 1
          fi
          echo "/health → $status OK"
          # /api-console is an explicitly defined route; hitting it without a token
          # exercises the API Gateway JWT authorizer on the /{proxy+} catch-all.
          # No --retry-all-errors here: 401 is the expected outcome, not an error,
          # and retrying on it would add unnecessary delay.
          echo "Checking auth → ${backend_url%/}/api-console"
          curl_exit=0
          auth_status=$(curl --retry 3 --retry-delay 5 \
            --max-time 60 --write-out "%{http_code}" --silent --output /dev/null \
            "${backend_url%/}/api-console") || curl_exit=$?
          if [ "$curl_exit" -ne 0 ]; then
            echo "curl failed (exit ${curl_exit}) checking ${backend_url%/}/api-console" >&2
            exit 1
          fi
          if [ "$auth_status" != "401" ]; then
            echo "Expected HTTP 401 from protected /api-console endpoint, got $auth_status — Cognito authorizer may not be wired up" >&2
            exit 1
          fi
          echo "/api-console → $auth_status (auth required) OK"
          # Check CloudFront distribution domain directly (not the canonical custom domain).
          # Expected response depends on the deployment's customDomain context flag:
          #   customDomain=false (default): viewer-request.js passes the request through →
          #     200 from the SPA index (or appropriate HTML response).
          #   customDomain=true (when alias/cert/DNS are configured): viewer-request.js
          #     redirects non-canonical hosts to https://app.allotmint.io → 301.
          # Accepting 200 OR 301 handles both cases.  A 301 from a customDomain=false
          # deployment indicates a bug in viewer-request.js (likely the infinite proto
          # self-redirect fixed in issue #3763); that class of fault is caught by
          # Lighthouse CI (step "Run Lighthouse CI") which Chrome would fail with
          # ERR_TOO_MANY_REDIRECTS / CHROME_INTERSTITIAL_ERROR.
          # Use --output /dev/null (not >/dev/null) to avoid curl exit 23 on HTTP/2 streams.
          echo "Checking CloudFront → https://${frontend_domain}"
          curl_exit=0
          cf_status=$(curl --retry 3 --retry-delay 5 --retry-all-errors \
            --max-time 60 --write-out "%{http_code}" --silent --output /dev/null \
            "https://${frontend_domain}") || curl_exit=$?
          if [ "$curl_exit" -ne 0 ]; then
            echo "curl failed (exit ${curl_exit}) checking https://${frontend_domain}" >&2
            exit 1
          fi
          if [ "$cf_status" != "200" ] && [ "$cf_status" != "301" ]; then
            echo "Expected 200 or 301 from CloudFront distribution, got $cf_status" >&2
            exit 1
          fi
          echo "CloudFront → $cf_status OK"

      - name: Fetch BackendLambda CloudWatch logs (deploy)
        # BackendLambdaLogGroupName is exported by BackendLambdaStack at
        # cdk/stacks/backend_lambda_stack.py (CfnOutput "BackendLambdaLogGroupName").
        # The deploy IAM role must have logs:FilterLogEvents on the log group ARN for
        # this step to produce output; see the FilterBackendLambdaLogEvents grant in
        # cdk/stacks/backend_lambda_stack.py and scripts/bash/fetch-cloudwatch-logs.sh
        # for how an AccessDeniedException is surfaced as a `::warning::`.
        if: always()
        continue-on-error: true
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          log_group="$(aws cloudformation describe-stacks \
            --stack-name BackendLambdaStack \
            --query "Stacks[0].Outputs[?OutputKey=='BackendLambdaLogGroupName'].OutputValue" \
            --output text 2>/dev/null || echo "")"
          if [ -z "$log_group" ] || [ "$log_group" = "None" ]; then
            echo "BackendLambdaLogGroupName not found in BackendLambdaStack outputs; skipping log dump." >&2
            exit 0
          fi
          echo "=== BackendLambda CloudWatch logs (last 10 minutes) ==="
          bash scripts/bash/fetch-cloudwatch-logs.sh "$log_group" 600

      - name: Check recent BackendLambda CloudWatch errors
        if: always()
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          backend_fn="$(aws cloudformation list-stack-resources \
            --stack-name BackendLambdaStack \
            --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function' && starts_with(LogicalResourceId, 'BackendLambda')].PhysicalResourceId | [0]" \
            --output text)"
          if [ -z "$backend_fn" ] || [ "$backend_fn" = "None" ]; then
            echo "Unable to resolve BackendLambda physical function name from BackendLambdaStack resources" >&2
            exit 1
          fi
          read -r start_time end_time <<EOF
          $(METRIC_START="${METRIC_START:-}" python - <<'PY'
          import os
          from datetime import datetime, timedelta, timezone
          end = datetime.now(timezone.utc)
          metric_start_raw = os.environ.get("METRIC_START", "")
          if metric_start_raw:
              try:
                  start = datetime.fromisoformat(metric_start_raw.replace("Z", "+00:00"))
              except ValueError:
                  start = end - timedelta(minutes=5)
          else:
              start = end - timedelta(minutes=5)
          print(start.strftime("%Y-%m-%dT%H:%M:%SZ"), end.strftime("%Y-%m-%dT%H:%M:%SZ"))
          PY
          )
          EOF
          invocation_sum="$(aws cloudwatch get-metric-statistics \
            --namespace AWS/Lambda \
            --metric-name Invocations \
            --dimensions "Name=FunctionName,Value=${backend_fn}" \
            --start-time "${start_time}" \
            --end-time "${end_time}" \
            --period 60 \
            --statistics Sum \
            --query "sum(Datapoints[].Sum)" \
            --output text)"
          error_sum="$(aws cloudwatch get-metric-statistics \
            --namespace AWS/Lambda \
            --metric-name Errors \
            --dimensions "Name=FunctionName,Value=${backend_fn}" \
            --start-time "${start_time}" \
            --end-time "${end_time}" \
            --period 60 \
            --statistics Sum \
            --query "sum(Datapoints[].Sum)" \
            --output text)"
          normalize_metric() {
            local metric_value="$1"
            if [ -z "${metric_value}" ] || [ "${metric_value}" = "None" ] || [ "${metric_value}" = "null" ]; then
              echo "0"
              return
            fi
            if ! [[ "${metric_value}" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
              echo "Unexpected CloudWatch metric value: ${metric_value}" >&2
              exit 1
            fi
            echo "${metric_value%%.*}"
          }
          invocation_count="$(normalize_metric "${invocation_sum}")"
          error_count="$(normalize_metric "${error_sum}")"
          if [ "${invocation_count}" -lt 1 ]; then
            # All API routes require Cognito JWT auth enforced at the API Gateway
            # level, so unauthenticated post-deploy curl probes never reach Lambda.
            # Zero invocations here is expected and does not indicate a problem.
            echo "No Lambda invocations in the last 5 minutes (expected: Cognito JWT auth blocks unauthenticated probes at API Gateway)"
          elif [ "${error_count}" -gt 0 ]; then
            echo "Backend Lambda reported ${error_count} errors in the last 5 minutes" >&2
            exit 1
          fi

      - name: Run Lighthouse CI
        if: env.LIGHTHOUSE_URL != ''
        run: |
          npm install --no-save @lhci/cli
          npx lhci autorun --collect.url="$LIGHTHOUSE_URL" \
            --upload.target=temporary-public-storage

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    env:
      SMOKE_URL: ${{ needs.deploy.outputs.backend_url || vars.SMOKE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION || vars.AWS_REGION }}

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: frontend

      - name: Resolve backend URL for smoke tests
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          # Resolve directly from CloudFormation rather than relying on the cross-job
          # output from the deploy job. Cross-job outputs containing masked secret
          # substrings (AWS_REGION appears in the API Gateway URL) arrive empty in
          # the downstream job, causing the smoke script to fall back to localhost.
          if [ -n "${SMOKE_URL:-}" ]; then
            echo "SMOKE_URL already set via vars.SMOKE_URL; skipping CloudFormation lookup."
            exit 0
          fi
          BACKEND_URL="$(aws cloudformation describe-stacks \
            --stack-name BackendLambdaStack \
            --query "Stacks[0].Outputs[?OutputKey=='BackendApiUrl'].OutputValue" \
            --output text)"
          if [ -z "$BACKEND_URL" ] || [ "$BACKEND_URL" = "None" ]; then
            echo "BackendApiUrl output is missing from BackendLambdaStack" >&2
            exit 1
          fi
          echo "SMOKE_URL=$BACKEND_URL" >> "$GITHUB_ENV"

      - name: Fetch Cognito smoke-test token
        # Looks up the dedicated SmokeTestClient from StaticSiteStack (created by CDK with
        # ALLOW_USER_PASSWORD_AUTH) and exchanges credentials for a fresh ID token.
        # Writing to $GITHUB_ENV makes SMOKE_AUTH_TOKEN and TEST_ID_TOKEN available to all
        # subsequent steps without needing explicit env: blocks on each one.
        # Uses continue-on-error so a missing secret or unconfigured client degrades
        # gracefully (smoke tests run unauthenticated) rather than blocking the job.
        continue-on-error: true
        env:
          SMOKE_TEST_USERNAME: ${{ secrets.SMOKE_TEST_USERNAME }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          if [ -z "${SMOKE_TEST_USERNAME:-}" ] || [ -z "${SMOKE_TEST_PASSWORD:-}" ]; then
            echo "SMOKE_TEST_USERNAME or SMOKE_TEST_PASSWORD not configured; smoke tests will run unauthenticated."
            exit 0
          fi
          client_id="$(aws cloudformation describe-stacks \
            --stack-name StaticSiteStack \
            --query "Stacks[0].Outputs[?OutputKey=='SmokeTestUserPoolClientId'].OutputValue" \
            --output text 2>/dev/null || echo "")"
          if [ -z "$client_id" ] || [ "$client_id" = "None" ]; then
            echo "SmokeTestUserPoolClientId not found in StaticSiteStack outputs; smoke tests will run unauthenticated."
            exit 0
          fi
          TOKEN="$(aws cognito-idp initiate-auth \
            --auth-flow USER_PASSWORD_AUTH \
            --client-id "$client_id" \
            --auth-parameters "USERNAME=${SMOKE_TEST_USERNAME},PASSWORD=${SMOKE_TEST_PASSWORD}" \
            --query 'AuthenticationResult.IdToken' \
            --output text)"
          echo "::add-mask::${TOKEN}"
          printf 'SMOKE_AUTH_TOKEN=%s\n' "${TOKEN}" >> "$GITHUB_ENV"
          printf 'TEST_ID_TOKEN=%s\n' "${TOKEN}" >> "$GITHUB_ENV"
          echo "Smoke-test Cognito token fetched and masked."

      - name: Run backend smoke tests
        run: npm run smoke:test

      - name: Run frontend smoke tests
        # Run even if the backend smoke step failed so frontend results are
        # always visible in CI logs (fixes issue #3055).  SMOKE_URL at job
        # level is the backend API URL; override it to localhost so Playwright
        # navigates to the local preview server, and expose the backend URL via
        # VITE_ALLOTMINT_API_BASE so the built app calls the real deployed API.
        # SMOKE_AUTH_TOKEN and TEST_ID_TOKEN arrive via $GITHUB_ENV set by the
        # token-fetch step above; no explicit env: entries needed here.
        if: success() || failure()
        run: npm --prefix frontend run smoke:frontend
        env:
          VITE_ALLOTMINT_API_BASE: ${{ env.SMOKE_URL }}
          SMOKE_URL: 'http://localhost:5173'

      - name: Upload Playwright deploy-smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-deploy-smoke-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore

      - name: Fetch Lambda logs from smoke test
        # The deploy IAM role must have logs:FilterLogEvents on the log group ARN for
        # this step to produce output; see the FilterBackendLambdaLogEvents grant in
        # cdk/stacks/backend_lambda_stack.py and scripts/bash/fetch-cloudwatch-logs.sh
        # for how an AccessDeniedException is surfaced as a `::warning::`.
        if: always()
        continue-on-error: true
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
        run: |
          set -euo pipefail
          log_group="$(aws cloudformation describe-stacks \
            --stack-name BackendLambdaStack \
            --query "Stacks[0].Outputs[?OutputKey=='BackendLambdaLogGroupName'].OutputValue" \
            --output text)"
          if [ -z "$log_group" ] || [ "$log_group" = "None" ]; then
            echo "BackendLambdaLogGroupName output not found in BackendLambdaStack; skipping" >&2
            exit 0
          fi
          echo "=== BackendLambda CloudWatch logs (last 15 minutes) ==="
          bash scripts/bash/fetch-cloudwatch-logs.sh "$log_group" 900

  verify-smoke-tests:
    name: Verify post-deploy smoke tests passed
    runs-on: ubuntu-latest
    needs: smoke-test
    if: always()
    steps:
      - name: Check smoke test job status
        if: needs.smoke-test.result != 'success'
        run: |
          echo "::error::Post-deploy smoke tests failed or were skipped — deployment validation incomplete."
          exit 1
      - name: Smoke tests verified
        run: echo "✓ Post-deploy smoke tests passed — deployment validated"

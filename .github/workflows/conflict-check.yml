name: Merge Conflict Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  check-merge-conflicts:
    if: github.event_name == 'pull_request'
    # GitHub derives the check-run name from this `name:` field.
    # The recheck-open-prs job posts a new check-run under the same name
    # on every push to main. GitHub branch protection evaluates the most
    # recent check-run per name+SHA, so both triggers satisfy the same
    # required check without any additional configuration.
    name: Check for merge conflicts with main
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Attempt merge with main (dry run)
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git fetch origin main
          if ! git merge --no-commit --no-ff origin/main; then
            echo "::error::This branch has merge conflicts with main. Resolve them before merging."
            git merge --abort
            exit 1
          fi
          git reset --hard HEAD
          echo "No merge conflicts detected."

  recheck-open-prs:
    if: github.event_name == 'push'
    name: Re-check open PRs against new main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Re-run merge dry-run for each open PR targeting main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MAIN_SHA: ${{ github.sha }}
        run: |
          set -e
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"

          prs=$(gh pr list --repo "$REPO" --base main --state open --json number,headRefOid,headRefName -q '.[] | "\(.number) \(.headRefOid) \(.headRefName)"')

          if [ -z "$prs" ]; then
            echo "No open PRs targeting main."
            exit 0
          fi

          while IFS=' ' read -r number sha branch; do
            echo "::group::PR #$number ($branch @ $sha)"

            # The clone only has main's history by default; fetch this PR's
            # head commit explicitly so the checkout below has an object to
            # point at (it is not reachable from main).
            git fetch --quiet origin "$sha"
            git checkout --quiet --force "$sha"
            git clean -fd --quiet

            # Merge against the exact commit that triggered this run, not the
            # origin/main remote-tracking ref -- another push could move that
            # ref between checkout and the merge attempt.
            #
            # `git merge` exits 1 for both real content conflicts and other
            # fatal errors (e.g. invalid ref, dirty worktree). Only exit code
            # 1 with the working tree actually left mid-merge is a genuine
            # conflict; anything else is an infrastructure problem and must
            # not be reported as "has merge conflicts with main".
            set +e
            git merge --no-commit --no-ff "$MAIN_SHA"
            merge_exit=$?
            set -e

            # Always return to a clean state before the next iteration,
            # regardless of whether a merge is in progress or merely staged.
            git merge --abort 2>/dev/null || true
            git checkout --quiet --force "$sha"
            git clean -fd --quiet

            if [ "$merge_exit" -eq 0 ]; then
              conclusion="success"
              summary="No merge conflicts detected with the latest main."
              echo "PR #$number: no merge conflicts with main."
            elif [ "$merge_exit" -eq 1 ]; then
              conclusion="failure"
              summary="PR #$number has merge conflicts with the latest main."
              echo "::error::PR #$number ($branch) now has merge conflicts with main."
            else
              echo "::warning::git merge exited with unexpected code $merge_exit for PR #$number ($branch); skipping check-run update for this PR."
              echo "::endgroup::"
              continue
            fi

            # Design decision (investigated in issue #3738, tested in PR #3731):
            # Always POST a new check-run; do not attempt PATCH.
            #
            # PATCH /repos/{owner}/{repo}/check-runs/{id} returns HTTP 403 when
            # the caller is a different workflow run than the one that created
            # the check-run. GitHub's Checks API enforces per-App-installation
            # ownership at the individual run level: even though both the
            # pull_request trigger and this push trigger use the same
            # github-actions[bot] app, they receive distinct installation tokens
            # that GitHub treats as separate owners for update purposes.
            #
            # A GET-then-PATCH approach was implemented and tested (see
            # d86479dc); it silently fell back to POST every time because the
            # PATCH always returned 403. That confusion was worse than the
            # known limitation it was trying to fix.
            #
            # Accepted trade-off: older check-run entries accumulate in the
            # "Checks" tab of long-lived PRs, but this is purely cosmetic.
            # GitHub branch protection evaluates the most-recent check-run per
            # name+SHA, so the fresh POST reliably satisfies the required-check
            # gate without extra configuration.
            if ! gh api "repos/$REPO/check-runs" \
              -f name="Check for merge conflicts with main" \
              -f head_sha="$sha" \
              -f status="completed" \
              -f conclusion="$conclusion" \
              -f "output[title]=Merge conflict check" \
              -f "output[summary]=$summary"; then
              echo "::warning::Failed to post check run for PR #$number ($sha)"
            fi

            echo "::endgroup::"
          done <<< "$prs"

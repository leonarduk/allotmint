name: Merge Conflict Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  check-merge-conflicts:
    if: github.event_name == 'pull_request'
    name: Check for merge conflicts with main
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Attempt merge with main (dry run)
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git fetch origin main
          if ! git merge --no-commit --no-ff origin/main; then
            echo "::error::This branch has merge conflicts with main. Resolve them before merging."
            git merge --abort
            exit 1
          fi
          git reset --hard HEAD
          echo "No merge conflicts detected."

  recheck-open-prs:
    if: github.event_name == 'push'
    name: Re-check open PRs against new main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Re-run merge dry-run for each open PR targeting main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MAIN_SHA: ${{ github.sha }}
        run: |
          set -e
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"

          prs=$(gh pr list --repo "$REPO" --base main --state open --json number,headRefOid,headRefName -q '.[] | "\(.number) \(.headRefOid) \(.headRefName)"')

          if [ -z "$prs" ]; then
            echo "No open PRs targeting main."
            exit 0
          fi

          while IFS=' ' read -r number sha branch; do
            echo "::group::PR #$number ($branch @ $sha)"

            # The clone only has main's history by default; fetch this PR's
            # head commit explicitly so the checkout below has an object to
            # point at (it is not reachable from main).
            git fetch --quiet origin "$sha"
            git checkout --quiet --force "$sha"
            git clean -fd --quiet

            # Merge against the exact commit that triggered this run, not the
            # origin/main remote-tracking ref -- another push could move that
            # ref between checkout and the merge attempt.
            if git merge --no-commit --no-ff "$MAIN_SHA"; then
              conclusion="success"
              summary="No merge conflicts detected with the latest main."
              echo "PR #$number: no merge conflicts with main."
            else
              conclusion="failure"
              summary="PR #$number has merge conflicts with the latest main."
              echo "::error::PR #$number ($branch) now has merge conflicts with main."
            fi

            # Always return to a clean state before the next iteration,
            # regardless of whether a merge is in progress or merely staged.
            git merge --abort 2>/dev/null || true
            git checkout --quiet --force "$sha"
            git clean -fd --quiet

            # The pull_request-triggered job (check-merge-conflicts) is named
            # "Check for merge conflicts with main" (see the job's `name:` field
            # above); GitHub automatically assigns that string as the check-run
            # name. We PATCH that same check-run here rather than POSTing a new
            # one, so both triggers converge on a single UI entry per SHA
            # (satisfying the "exactly one indicator" requirement). POST would
            # create an additional check-run entry each time.
            CHECK_NAME="Check for merge conflicts with main"
            existing_id=$(gh api "repos/$REPO/commits/$sha/check-runs" \
              --jq ".check_runs[] | select(.name == \"$CHECK_NAME\") | .id" \
              2>/dev/null | head -1 || true)

            if [ -n "$existing_id" ]; then
              if ! gh api "repos/$REPO/check-runs/$existing_id" -X PATCH \
                -f status="completed" \
                -f conclusion="$conclusion" \
                -f "output[title]=Merge conflict check" \
                -f "output[summary]=$summary"; then
                echo "::warning::Failed to update check run $existing_id for PR #$number ($sha)"
              fi
            else
              if ! gh api "repos/$REPO/check-runs" \
                -f name="$CHECK_NAME" \
                -f head_sha="$sha" \
                -f status="completed" \
                -f conclusion="$conclusion" \
                -f "output[title]=Merge conflict check" \
                -f "output[summary]=$summary"; then
                echo "::warning::Failed to create check run for PR #$number ($sha)"
              fi
            fi

            echo "::endgroup::"
          done <<< "$prs"

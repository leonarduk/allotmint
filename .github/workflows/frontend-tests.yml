name: Frontend Tests

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check SPA contract version sync
        run: python scripts/check_contract_version_sync.py

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      # tsc -b resolves frontend/tsconfig.json, which references
      # tsconfig.app.json (src/) and tsconfig.node.json (vite.config.ts).
      # Both are checked in one pass; no Vite build required.
      - name: TypeScript type-check (tsc -b)
        working-directory: frontend
        run: pnpm run type-check

      - name: Run tests with coverage
        working-directory: frontend
        run: pnpm test -- --run --coverage

      - name: Upload frontend coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: leonarduk/allotmint
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: true

      - name: Sitemap health check
        run: |
          pip install requests
          python scripts/site_healthcheck.py

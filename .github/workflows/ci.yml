name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm test -- --run
        working-directory: frontend
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest

  python-compatibility:
    name: Python ${{ matrix.python-version }} compatibility smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v6.0.2
      # Python 3.12 remains the primary CI/backend integration version; this
      # lightweight matrix keeps Python 3.11 support honest without duplicating
      # the full backend integration and coverage workflow.
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Check SPA contract version sync
        run: python scripts/check_contract_version_sync.py
      - name: Run lightweight backend compatibility tests
        env:
          ALLOTMINT_SKIP_SNAPSHOT_WARM: 'true'
        run: pytest --no-cov tests/test_backend_api.py::test_health tests/backend/common/test_data_provider_parity.py -q

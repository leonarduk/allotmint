name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  ai-review:
    name: Claude AI code review
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      pull-requests: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(python3 .github/scripts/prepare_review_diff.py --base-ref "${{ github.base_ref }}")
          DELIM="EOF_$(uuidgen | tr -d '-')"
          {
            echo "diff<<$DELIM"
            echo "$DIFF"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Get linked issue body
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=$(gh pr view ${{ github.event.pull_request.number }} --json body,title \
            | jq -r '[.title, .body] | join(" ")' \
            | grep -oE '(Closes|Fixes|Refs) #[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
          if [ -n "$ISSUE_NUM" ]; then
            ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body -q .body 2>/dev/null || echo "Issue not found")
          else
            ISSUE_BODY="No linked issue found. Review code on its own merits."
          fi
          DELIM="EOF_$(uuidgen | tr -d '-')"
          {
            echo "body<<$DELIM"
            echo "$ISSUE_BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Call Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MAX_TOKENS: "6000"
          PR_TITLE: ${{ github.event.pull_request.title }}
          DIFF: ${{ steps.diff.outputs.diff }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          python3 .github/scripts/claude_review.py > /tmp/claude_review_body.md

          if [ ! -s /tmp/claude_review_body.md ]; then
            echo "ERROR: Claude review output was empty" >&2
            exit 1
          fi

      - name: Check Claude approval
        run: |
          python3 .github/scripts/extract_verdict.py /tmp/claude_review_body.md Claude

      - name: Post Claude review comment
        if: always() && !cancelled()
        continue-on-error: true  # If posting fails (e.g. API rate limit), don't fail job; review is also in Actions summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -s /tmp/claude_review_body.md ]; then
            # Claude API succeeded — post the full review (APPROVE or REQUEST CHANGES)
            {
              echo "## Claude AI Code Review"
              echo ""
              cat /tmp/claude_review_body.md
              echo ""
              echo "---"
              echo "*Reviewed by Claude via [claude-pr-review.yml](.github/workflows/claude-pr-review.yml). Advisory only.*"
            } > /tmp/claude_comment_body.md
          else
            # Claude API failed or produced empty output — notify user to check logs
            {
              echo "## Claude AI Code Review - Failed"
              echo ""
              echo "The Claude review failed to complete. Check [Actions]($RUN_URL) for error details."
            } > /tmp/claude_comment_body.md
          fi

          gh pr comment "$PR_NUMBER" --body-file /tmp/claude_comment_body.md

      - name: Create follow-up issues from review
        # Only runs when the review was posted successfully and the verdict is APPROVE.
        # Parses section 5 of the review and opens one GitHub issue per follow-up title,
        # so they are not lost if an automated process merges on APPROVE.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          # Only proceed if the review verdict is APPROVE.
          if ! python3 .github/scripts/extract_verdict.py /tmp/claude_review_body.md Claude > /dev/null 2>&1; then
            echo "Verdict is not APPROVE — skipping follow-up issue creation."
            exit 0
          fi
          # Extract follow-up titles as a JSON array.
          followups="$(python3 .github/scripts/extract_followups.py /tmp/claude_review_body.md)"
          count="$(echo "$followups" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          if [ "$count" -eq 0 ]; then
            echo "No follow-up issues suggested — nothing to create."
            exit 0
          fi
          echo "Creating $count follow-up issue(s) from Claude review of PR #${PR_NUMBER}..."
          echo "$followups" | python3 -c "
          import json, subprocess, sys
          titles = json.load(sys.stdin)
          pr_url = '${PR_URL}'
          pr_number = '${PR_NUMBER}'
          for title in titles:
              body = (
                  f'This issue was automatically created from a follow-up suggestion '
                  f'in the Claude AI review of PR #{pr_number}.\n\n'
                  f'Source: {pr_url}\n\n'
                  f'> {title}'
              )
              subprocess.run(
                  ['gh', 'issue', 'create',
                   '--title', title,
                   '--body', body,
                   '--label', 'ai-suggested'],
                  check=True,
              )
              print(f'Created issue: {title}')
          "

      - name: Post Claude failure notice
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          printf '## Claude AI Code Review - Failed\n\nThe Claude review did not APPROVE this PR. Review the changes and address any concerns raised.\n\nCheck [Actions](%s) for details.\n' \
            "$RUN_URL" > /tmp/claude_fail_notice.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/claude_fail_notice.md
